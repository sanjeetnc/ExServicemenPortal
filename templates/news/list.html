{% extends 'base.html' %}
{% load i18n %}
{% block content %}

<section class="bg-gradient-to-r from-blue-900 via-blue-800 to-green-700 py-20">

    <div class="container mx-auto px-6 text-center text-white">

        <h1 class="text-5xl font-bold">
            Latest News
        </h1>

        <p class="mt-4 text-xl">
            Updates, Events and Welfare Announcements
        </p>

    </div>

</section>

<section class="py-20 bg-slate-50">

    <div class="container mx-auto px-6">

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

            {% for article in news_items %}

            <div class="bg-white rounded-3xl shadow-lg overflow-hidden">

                <img
                    src="{{ article.image.url }}"
                    class="w-full h-56 object-cover"
                    alt="{{ article.title }}"
                >

                <div class="p-6">

                    <h2 class="text-2xl font-bold mb-3">
                        {{ article.title }}
                    </h2>

                    <p class="text-sm text-slate-500 mb-4">
                        {{ article.created_at|date:"d M Y" }}
                    </p>

                    <a
                        href="{% url 'news_detail' article.slug %}"
                        class="inline-block bg-blue-900 text-white px-5 py-2 rounded-lg"
                    >
                        Read More
                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</section>

{% endblock %}
